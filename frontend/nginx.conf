# ═══════════════════════════════════════════════════════════════════════════════
# EduPlatform — nginx site config for standalone (non-Docker) deployment
#
# DEPLOY:
#   1. Build frontend:  cd frontend && npm run build
#   2. Copy dist/:      rsync -av dist/ user@server:/var/www/eduplatform/
#   3. Copy this file:  scp nginx.conf user@server:/etc/nginx/sites-available/eduplatform
#   4. On server:
#        sudo ln -sf /etc/nginx/sites-available/eduplatform /etc/nginx/sites-enabled/eduplatform
#        sudo nginx -t && sudo systemctl reload nginx
#
# ADJUST:
#   - Replace /var/www/eduplatform with your actual document root
#   - Replace server_name with your domain or IP
# ═══════════════════════════════════════════════════════════════════════════════

server {
    listen 80;
    server_name _;                        # replace with your domain or IP

    root /var/www/eduplatform;            # path to your dist/ contents
    index index.html;

    # ── MIME types ────────────────────────────────────────────────────────────
    # nginx's built-in mime.types omits .mjs. Without this override the browser
    # receives Content-Type: application/octet-stream for pdf.worker.min.mjs
    # and refuses to load it as a Worker.
    include /etc/nginx/mime.types;
    types {
        application/javascript  mjs;
    }

    # ── gzip ──────────────────────────────────────────────────────────────────
    gzip on;
    gzip_vary on;
    gzip_proxied any;
    gzip_comp_level 6;
    gzip_types
        text/plain
        text/css
        application/json
        application/javascript
        text/xml
        application/xml
        text/javascript
        application/wasm;

    # ── pdf.worker — exact match, short cache (filename is NOT hashed) ────────
    location = /pdf.worker.min.mjs {
        add_header Cache-Control "public, max-age=3600";
        add_header Content-Type  "application/javascript" always;
        # Allow SharedArrayBuffer used by pdfjs-dist v4
        add_header Cross-Origin-Opener-Policy  "same-origin" always;
        add_header Cross-Origin-Embedder-Policy "require-corp" always;
    }

    # ── Hashed JS/CSS/assets — immutable long-lived cache ────────────────────
    location ~* \.(js|mjs|css|woff|woff2|ttf|eot|png|jpg|jpeg|gif|ico|svg|wasm)$ {
        expires 1y;
        add_header Cache-Control "public, immutable";
    }

    # ── API proxy — forward /api/v1/* to NestJS backend ──────────────────────
    # Remove or adjust if your backend is on a different host/port.
    location /api/v1/ {
        proxy_pass         http://127.0.0.1:3001;
        proxy_http_version 1.1;
        proxy_set_header   Upgrade $http_upgrade;
        proxy_set_header   Connection "upgrade";
        proxy_set_header   Host $host;
        proxy_set_header   X-Real-IP $remote_addr;
        proxy_set_header   X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header   X-Forwarded-Proto $scheme;
        proxy_read_timeout 60s;
    }

    # ── SPA fallback — all unmatched routes serve index.html ─────────────────
    location / {
        try_files $uri $uri/ /index.html;
    }

    # ── Security headers ──────────────────────────────────────────────────────
    add_header X-Frame-Options        "SAMEORIGIN"                  always;
    add_header X-Content-Type-Options "nosniff"                     always;
    add_header X-XSS-Protection       "1; mode=block"               always;
    add_header Referrer-Policy        "strict-origin-when-cross-origin" always;
}
